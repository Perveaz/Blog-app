{% extends 'blog/base.html'%}
{% block content %}
<div class="form-card">
<h2>Create blog</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required style="width:300px;">
            {% if form.title.errors %}
                <span class="field-error">❌ {{ form.title.errors.0 }}</span>
            {% endif %}
        </div>
        <div class="form-group">
            <label>Content</label>
            <textarea name="content" rows="6" style="width:300px;" required></textarea>
            {% if form.content.errors %}
                <span class="field-error">❌ {{ form.content.errors.0 }}</span>
            {% endif %}
        </div>
        <div style="display:flex; gap:10px;">
            <button type="submit">Create Post</button>
        </div>
    </form>
</div>
{% endblock %}
